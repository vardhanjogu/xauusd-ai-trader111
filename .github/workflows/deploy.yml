name: XAUUSD AI Trader CI/CD

on:
  push:
    branches:
      - main
  pull_request:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  REPO_NAME: xauusd-trader

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Install dependencies properly (in real usage we'd have a root requirements.txt or pytest)
      # - name: Install Dependencies & Run Tests
      #   run: |
      #     pip install pytest
      #     pytest

      - id: "auth"
        uses: "google-github-actions/auth@v1"
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker $GAR_LOCATION-docker.pkg.dev

      - name: Build and Push Microservices
        run: |
          SERVICES=("api_gateway" "market_data" "data_pipeline" "ai_model" "strategy_engine" "risk_manager" "execution" "backtesting")
          for SERVICE in "${SERVICES[@]}"; do
            IMAGE_URL="$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE:${{ github.sha }}"
            
            # Using basic docker build and push
            docker build -t "$IMAGE_URL" "services/$SERVICE"
            docker push "$IMAGE_URL"
            
            # Deploy to Cloud Run
            gcloud run deploy "$SERVICE" \
              --image "$IMAGE_URL" \
              --region "$GAR_LOCATION" \
              --platform managed \
              --allow-unauthenticated \
              --set-env-vars GCP_PROJECT_ID=$PROJECT_ID
          done

  deploy-frontend:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: "--prod"
